name: bus_attendant_app
description: Bukidnon bus attendant (operator) app — Flutter UI + Node.js API client.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  shared_preferences: ^2.2.3
  google_fonts: ^6.3.3
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  socket_io_client: ^2.0.3+1
  connectivity_plus: ^6.1.4
  path_provider: ^2.1.5
  pdf: ^3.11.1
  share_plus: ^10.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/company_logo.png
    - Designs/LoginBackgroundImage.jpg
    - Designs/lightmode.png
    - Designs/darkmode.png
